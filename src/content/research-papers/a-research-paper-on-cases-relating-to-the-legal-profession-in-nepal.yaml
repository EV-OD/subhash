title: A RESEARCH PAPER ON CASES RELATING TO THE LEGAL PROFESSION IN NEPAL
author: Subhash Lamichhane
excerpt: >-
  This paper examines the legal profession in Nepal through the study of
  selected case laws. It briefly outlines the historical and regulatory
  background of the profession and then focuses on how courts have interpreted
  the duties, ethics, and responsibilities of legal practitioners. The cases
  discussed illustrate issues such as professional conduct, conflict of
  interest, courtroom responsibility, and the role of advocates in the
  administration of justice. By analysing judicial reasoning in these decisions,
  the paper shows how case law contributes to defining professional standards
  and guiding the behaviour of lawyers. The study also highlights how courts
  reinforce the idea that legal practitioners are officers of the court and must
  act in accordance with ethical and procedural obligations. Overall, the paper
  demonstrates that judicial precedents play an important role in shaping
  accountability, discipline, and public confidence in the legal profession in
  Nepal.



  Key words: Legal Profession; Nepal Bar Council; Professional Ethics; Legal
  Practitioners; Judicial Discipline; Conflict of Interest; Advocacy Standards;
  Administration of Justice; Legal History Nepal; Supreme Court Jurisprudence.
